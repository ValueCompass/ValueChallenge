<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>前后端分离测试</title>
</head>
<body>

<h1>前后端分离测试</h1>

<button onclick="callApi()">请求后端 API</button>

<pre id="result">点击按钮后会显示结果...</pre>

<script>
function callApi() {
    fetch("https://api.yourdomain.com/api.php")
        .then(response => response.json())
        .then(data => {
            document.getElementById("result").innerText =
                JSON.stringify(data, null, 2);
        })
        .catch(err => {
            document.getElementById("result").innerText =
                "请求失败: " + err;
        });
}
</script>

</body>
</html>
