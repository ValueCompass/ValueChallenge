<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - Global AI Values Challenge</title>
    <link href="../static/css/bootstrap.min.css" rel="stylesheet">
    <link href="../static/css/style.css" rel="stylesheet">
    <link rel="stylesheet" href="../static/fontawesome/css/all.min.css">
    <script src="../static/js/chart.min.js"></script>
    <link href="../static/css/main.css" rel="stylesheet">
    <link href="../static/css/dev.css" rel="stylesheet">
    <link rel="stylesheet" href="../static/css/cookieconsent.css">
    <script type="text/javascript" src="../static/js/cookieconsent.umd.js"></script>
    <style>a:hover{text-decoration:unset;}</style>
    <script src="../static/js/jquery-3.6.0.min.js"></script>
    <script src="../static/js/jquery.validate.min.js"></script>
    <script src="../static/js/additional-methods.min.js"></script>
    <script src="../static/js/bootstrap.bundle.min.js"></script>
    <script src="../static/js/sweetalert2@11.js"></script>
    <script src="../static/js/common.js"></script>
</head>
<body>
<div id="app">
    <div id="header-placeholder"></div>
    <div class="banner"><img src="../static/images/banner@2x.jpg" alt=""></div>
    <div id="nav-placeholder"></div>

    <div class="container">
        <h1 class="page-title-blue">Change Password</h1>
        <form id="passwordForm" onsubmit="return changePassword()">
            <div class="form-container password-container">
                <div class="form-group">
                    <label>Old Password</label>
                    <input type="password" placeholder="Please enter old password" id="old_password" name="old_password">
                    <p class="error-tip"></p>
                </div>
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" placeholder="Please enter new password" id="new_password" name="new_password">
                    <p class="form-tip">Password must be at least 8 characters and contain uppercase, lowercase letters, and numbers.</p>
                    <p class="error-tip"></p>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" placeholder="Please confirm new password" id="confirm_new_password" name="confirm_new_password">
                    <p class="error-tip"></p>
                </div>
                <div class="action-btns">
                    <button class="btn-primary" type="submit" id="changeBtn">Submit</button>
                </div>
                <div id="passwordResult" class="mt-3"></div>
            </div>
        </form>
    </div>

    <div id="footer-placeholder"></div>
</div>
<script src="../js/config.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/app.js"></script>
<script type="text/javascript" src="../static/js/cookieconsent-config.js"></script>
<script>
$(function() {
    App.initLayout('submit');

    // Real-time password match validation
    document.getElementById('new_password').addEventListener('input', function() {
        var confirm = document.getElementById('confirm_new_password');
        if (confirm.value && this.value !== confirm.value) {
            confirm.classList.add('is-invalid');
        } else {
            confirm.classList.remove('is-invalid');
        }
    });
    document.getElementById('confirm_new_password').addEventListener('input', function() {
        var newPwd = document.getElementById('new_password').value;
        if (newPwd !== this.value) {
            this.classList.add('is-invalid');
        } else {
            this.classList.remove('is-invalid');
        }
    });
});

function changePassword() {
    event.preventDefault();
    var btn = document.getElementById('changeBtn');
    var oldPwd = document.getElementById('old_password').value;
    var newPwd = document.getElementById('new_password').value;
    var confirmPwd = document.getElementById('confirm_new_password').value;
    var isValid = true;

    if (oldPwd.trim().length === 0) {
        $("#old_password").siblings('.error-tip').html('Please enter old password'); isValid = false;
    } else { $("#old_password").siblings('.error-tip').html(''); }

    if (newPwd.trim().length === 0) {
        $("#new_password").siblings('.error-tip').html('Please enter new password'); isValid = false;
    } else { $("#new_password").siblings('.error-tip').html(''); }

    if (confirmPwd.trim().length === 0) {
        $("#confirm_new_password").siblings('.error-tip').html('Please enter confirm password'); isValid = false;
    } else { $("#confirm_new_password").siblings('.error-tip').html(''); }

    if (!isValid) return false;

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Changing...';

    Auth.apiPost('/profile/change-password', {
        old_password: oldPwd,
        new_password: newPwd,
        confirm_new_password: confirmPwd
    })
    .then(function(result) {
        if (result.code === 200) {
            lk.alert.confirm("Submit success! " + result.msg, function(isOk) {
                if (isOk) {
                    Auth.logout();
                }
            });
        } else {
            if (result.field) {
                $("#" + result.field).siblings('.error-tip').html(result.msg);
            } else {
                lk.alert.info(result.msg);
            }
        }
    })
    .catch(function() { lk.alert.info('Network error, please try again.'); })
    .finally(function() {
        btn.disabled = false;
        btn.innerHTML = 'Submit';
    });

    return false;
}
</script>
</body>
</html>
