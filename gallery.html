<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard - Global AI Values Challenge</title>
    <link href="/static/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/fontawesome/css/all.min.css">
    <link href="/static/css/main.css" rel="stylesheet">
    <link href="/static/css/dev.css" rel="stylesheet">
    <style>a:hover{text-decoration:unset;} .minors-contxt-txt{display:none;} .show{display:block;}</style>
</head>
<body>
<div id="app">
    <div id="header-placeholder"></div>
    <div class="banner"><img src="/static/images/banner@2x.jpg" alt=""></div>
    <div id="nav-placeholder"></div>

    <div class="leaderboard container">
        <div class="polaris">
            <div class="dzp" id="sunburstContainer" style="display:none;">
                <div id="sunburst" style="height:650px;width:650px;margin:0 auto;padding:0;"></div>
                <div class="dzp-tips">
                    <h2><span>Advanced Acceptances</span><img src="/static/images/第一排色卡@2x.png" alt=""></h2>
                    <h2><span>Standard Acceptances</span><img src="/static/images/第二排色卡@2x.png" alt=""></h2>
                </div>
            </div>
            <div class="polaris-list" id="polarisContainer" style="display:none;">
                <div class="polaris-title">Polaris List</div>
                <div class="polaris-ul">
                    <div class="th"><div></div><div><span>Competitor</span></div><div><span>Distinction Level</span></div></div>
                    <div class="tds" id="starList"></div>
                </div>
            </div>
        </div>
        <div class="minors-contxt">
            <div class="minors" id="themeList"></div>
            <div id="themeDetails"></div>
        </div>
    </div>

    <div id="footer-placeholder"></div>
</div>
<script src="/static/js/jquery-3.6.0.min.js"></script>
<script src="/static/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/sweetalert2@11.js"></script>
<script src="/static/js/common.js"></script>
<script src="/js/config.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/app.js"></script>
<script>
$(function() {
    App.initLayout('gallery');

    Auth.apiGet('/home/gallery').then(function(result) {
        var d = result.data;

        // Render Polaris List
        if (d.polarisList && d.polarisList.length >= 5) {
            $('#polarisContainer').show();
            var html = '';
            d.polarisList.forEach(function(po, k) {
                html += '<div class="td">';
                if (k < 3) { html += '<div><img src="/static/images/gallery' + (k+1) + '.png" alt=""></div>'; }
                else { html += '<div></div>'; }
                html += '<div><span>' + App.escHtml(po.username) + '</span></div>';
                html += '<div><div class="progress"><div class="progressing" style="width:' + po.progress + '%;"></div></div><span>' + po.s + '</span></div>';
                html += '</div>';
            });
            $('#starList').html(html);
        }

        // Render theme tabs
        var themes = d.themes || [];
        var tabHtml = '', detailHtml = '';
        themes.forEach(function(t, k) {
            var isActive = k === 0 ? 'active' : '';
            var isShow = k === 0 ? 'show' : '';
            tabHtml += '<div class="minors-item ' + isActive + '" data-theme="' + t.id + '">'
                + '<div class="lt"><img src="/static/images/灰色星星@2x.png" class="gray" alt=""><img src="/static/images/彩色星星@2x.png" class="color" alt=""><span>' + App.escHtml(t.name) + '</span></div>'
                + '<div class="rt"><span>' + t.wcb + '%</span></div>'
                + '<div class="top-toast"><div><span>Total Acceptances</span><img src="/static/images/target acceptances@2x.png" alt=""></div><span class="line"></span><div class="tx-lt"><img src="/static/images/total acceptances@2x.png" alt=""><span>Target Acceptances</span></div></div></div>';
            detailHtml += '<div class="minors-contxt-txt ' + isShow + '" id="themeinfo' + t.id + '"><h3>' + App.escHtml(t.name) + '</h3><h5>' + App.escHtml(t.description) + '</h5></div>';
        });
        $('#themeList').html(tabHtml);
        $('#themeDetails').html(detailHtml);

        // Theme tab click
        $(document).on('click', '.minors-item', function() {
            $('.minors-item').removeClass('active');
            $(this).addClass('active');
            var themeId = $(this).data('theme');
            $('.minors-contxt-txt').removeClass('show');
            $('#themeinfo' + themeId).addClass('show');
        });

        // Sunburst chart
        if (d.newThemes && d.newThemes.length > 1 && d.echartsData && d.echartsData.children) {
            $('#sunburstContainer').show();
            var script = document.createElement('script');
            script.src = '/static/js/echarts.min.js';
            script.onload = function() { renderSunburst(d.echartsData, d.echartsColor); };
            document.body.appendChild(script);
        }
    });
});

function renderSunburst(echartsData, echartsColor) {
    var dom = document.getElementById('sunburst');
    var myChart = echarts.init(dom);
    var data = [echartsData];
    for (var j = 0; j < data.length; j++) {
        var level1 = data[j].children;
        for (var i = 0; i < level1.length; i++) {
            var block = level1[i].children;
            for (var star = 0; star < block.length; star++) {
                block[star].children = [{ name: "", value: block[star].value, itemStyle: { opacity: 1, color: block[star].label.color }, label: { color: block[star].label.color } }];
            }
        }
    }
    var option = {
        backgroundColor: "#ffffff",
        series: [{
            type: 'sunburst', center: ['50%', '50%'], data: data,
            sort: function(a, b) { if (a.depth === 1) return b.getValue() - a.getValue(); return a.dataIndex - b.dataIndex; },
            label: { rotate: 'radial', color: "#ffffff" },
            itemStyle: { borderColor: "#ffffff", borderWidth: 2 },
            levels: [{}, { r0:0, r:80, label:{rotate:0,fontSize:20,lineHeight:23} }, { r0:80, r:205, label:{fontSize:13} },
                { r0:220, r:290, itemStyle:{shadowBlur:2,shadowColor:"#1658af",color:'transparent'}, label:{rotate:'tangential',fontSize:25} },
                { r0:300, r:315, label:{position:'outside'}, downplay:{label:{opacity:0.5}} }]
        }]
    };
    myChart.setOption(option);
    window.addEventListener('resize', myChart.resize);
}
</script>
</body>
</html>
