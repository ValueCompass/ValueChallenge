<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Global AI Values Challenge</title>
    <link href="/static/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/fontawesome/css/all.min.css">
    <link href="/static/css/main.css" rel="stylesheet">
    <link href="/static/css/dev.css" rel="stylesheet">
    <style>a:hover{text-decoration:unset;}</style>
</head>
<body>
<div id="app">
    <div id="header-placeholder"></div>
    <div class="banner"><img src="/static/images/banner@2x.jpg" alt=""></div>
    <div id="nav-placeholder"></div>

    <div class="container">
        <h1 class="page-title-blue">Forgot Password</h1>
        <form id="forgotForm" onsubmit="return forgotSubmit()">
            <div class="form-container password-container">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="text" placeholder="Please enter your email" id="email" name="email">
                </div>
                <div class="form-group">
                    <label>Verification Code</label>
                    <div class="verification-group">
                        <input type="text" placeholder="Please enter verification code" id="code" name="code">
                        <button class="btn-verify" type="button" id="codeBtn" onclick="sendCode()">Send Verification Code</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" placeholder="Please enter new password" id="password" name="password">
                    <p class="form-tip">Password must be at least 8 characters and contain uppercase, lowercase letters, and numbers.</p>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" placeholder="Please confirm new password" id="confirm_password" name="confirm_password">
                </div>
                <div class="action-btns" style="margin-top: 4rem;">
                    <button class="btn-primary" type="submit" id="resetBtn">Submit</button>
                </div>
                <div id="forgotResult" class="mt-3"></div>
            </div>
        </form>
    </div>

    <div id="footer-placeholder"></div>
</div>
<script src="/static/js/jquery-3.6.0.min.js"></script>
<script src="/static/js/jquery.validate.min.js"></script>
<script src="/static/js/additional-methods.min.js"></script>
<script src="/static/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/sweetalert2@11.js"></script>
<script src="/static/js/common.js"></script>
<script src="/js/config.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/app.js"></script>
<script>
$(function() {
    App.initLayout('index');
    $("#forgotForm").validate({
        errorClass: "error-tip", errorElement: "p",
        errorPlacement: function(error, element) {
            if (element.attr("name") == "code") { error.insertAfter(element.closest('.verification-group')); }
            else { error.insertAfter(element); }
        },
        rules: {
            email: { required: true, email: true }, code: { required: true },
            password: { required: true, pattern: /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,12}$/ },
            confirm_password: { required: true, equalTo: "#password" }
        },
        messages: {
            email: { required: "Please enter your email", email: "Incorrect email format" },
            code: { required: "Please enter the verification code" },
            password: { required: "Please enter your password", pattern: "Password must be 8-12 characters with uppercase, lowercase, and numbers" },
            confirm_password: { required: "Please confirm your password", equalTo: "Passwords do not match" }
        }
    });
    $('#email').val(localStorage.getItem('msra_login_email'));
});

function sendCode() {
    event.preventDefault();
    var btnObj = document.getElementById('codeBtn');
    if (!$("#email").valid()) return;
    var formData = new FormData(document.getElementById('forgotForm'));
    var timerObj = null;
    function djsStart() { if(timerObj){clearInterval(timerObj);} var count=60; btnObj.disabled=true; btnObj.innerHTML=count+'s'; timerObj=setInterval(function(){count--;if(count<=0){clearInterval(timerObj);btnObj.disabled=false;btnObj.innerHTML='Send Verification Code';}else{btnObj.innerHTML=count+'s';}},1000); }
    function djsClear() { if(timerObj){clearInterval(timerObj);} btnObj.disabled=false; btnObj.innerHTML='Send Verification Code'; }

    djsStart();
    Auth.apiPost('/auth/send-code', Object.fromEntries(formData))
        .then(function(result) {
            if (result.code === 200) { lk.alert.info("Verification code sent. " + result.msg); }
            else { djsClear(); if(result.field){$("#forgotForm").validate().showErrors({[result.field]:result.msg});}else{lk.alert.info("Fail! "+result.msg);} }
        })
        .catch(function() { djsClear(); lk.alert.info("Network error, please try again."); });
}

function forgotSubmit() {
    event.preventDefault();
    var btn = document.getElementById('resetBtn');
    if (!$("#forgotForm").valid()) return false;
    var formData = new FormData(document.getElementById('forgotForm'));
    btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Sending...';

    Auth.apiPost('/auth/forgot-password', Object.fromEntries(formData))
        .then(function(result) {
            if (result.code === 200) {
                lk.alert.confirm("Submit successful! " + result.msg, function(isOk) { if(isOk) window.location.href = '/auth/login.html'; });
            } else {
                if(result.field){$("#forgotForm").validate().showErrors({[result.field]:result.msg});}else{lk.alert.info("Fail! "+result.msg);}
            }
        })
        .catch(function() { lk.alert.info("Network error, please try again."); })
        .finally(function() { btn.disabled = false; btn.innerHTML = 'Submit'; });
    return false;
}
</script>
</body>
</html>
