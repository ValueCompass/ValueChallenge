<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Global AI Values Challenge</title>
    <link href="/static/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/fontawesome/css/all.min.css">
    <link href="/static/css/main.css" rel="stylesheet">
    <link href="/static/css/dev.css" rel="stylesheet">
    <style>a:hover{text-decoration:unset;}</style>
</head>
<body>
<div id="app">
    <div id="header-placeholder"></div>
    <div class="banner"><img src="/static/images/banner@2x.jpg" alt=""></div>
    <div id="nav-placeholder"></div>

    <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8">
            <div class="card">
                <div class="card-header"><h4 class="mb-0">Set New Password</h4></div>
                <div class="card-body">
                    <p class="text-muted mb-4">Please enter your new password below.</p>
                    <form id="resetForm" onsubmit="return resetSubmit()">
                        <div class="form-group">
                            <label for="password">New Password</label>
                            <input type="password" class="form-control" id="password" name="password" required minlength="6" placeholder="At least 6 characters">
                        </div>
                        <div class="form-group">
                            <label for="confirm_password">Confirm New Password</label>
                            <input type="password" class="form-control" id="confirm_password" name="confirm_password" required placeholder="Re-enter new password">
                        </div>
                        <button type="submit" class="btn btn-primary btn-lg btn-block" id="resetBtn">Reset Password</button>
                        <div id="resetResult" class="mt-3"></div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>
</div>
<script src="/static/js/jquery-3.6.0.min.js"></script>
<script src="/static/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/sweetalert2@11.js"></script>
<script src="/static/js/common.js"></script>
<script src="/js/config.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/app.js"></script>
<script>
$(function(){ App.initLayout('index'); });

function resetSubmit() {
    event.preventDefault();
    var btn = document.getElementById('resetBtn');
    var resultDiv = document.getElementById('resetResult');
    var params = new URLSearchParams(window.location.search);
    var token = params.get('token') || window.location.pathname.split('/').pop().replace('.html','');
    var password = document.getElementById('password').value;
    var confirmPassword = document.getElementById('confirm_password').value;
    if (password !== confirmPassword) { resultDiv.innerHTML = '<div class="alert alert-danger">Passwords do not match.</div>'; return false; }
    if (password.length < 6) { resultDiv.innerHTML = '<div class="alert alert-danger">Password must be at least 6 characters.</div>'; return false; }

    btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Resetting...';
    Auth.apiPost('/auth/reset-password/' + token, { password: password, confirm_password: confirmPassword })
        .then(function(result) {
            if (result.code === 200) {
                resultDiv.innerHTML = '<div class="alert alert-success">' + result.msg + '<p class="mt-2">Redirecting to login...</p></div>';
                setTimeout(function() { window.location.href = '/auth/login.html'; }, 2000);
            } else { resultDiv.innerHTML = '<div class="alert alert-danger">' + result.msg + '</div>'; }
        })
        .catch(function() { resultDiv.innerHTML = '<div class="alert alert-danger">Network error.</div>'; })
        .finally(function() { btn.disabled = false; btn.innerHTML = 'Reset Password'; });
    return false;
}
</script>
</body>
</html>
