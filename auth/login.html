<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Global AI Values Challenge</title>
    <link href="/static/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="/static/css/main.css" rel="stylesheet">
    <link href="/static/css/dev.css" rel="stylesheet">
    <style>a:hover{text-decoration:unset;}</style>
</head>
<body>
<div id="app">
    <div id="header-placeholder"></div>
    <div class="banner"><img src="/static/images/banner@2x.jpg" alt=""></div>
    <div id="nav-placeholder"></div>

    <div class="form-container login-form-box">
        <form id="loginForm" onsubmit="return loginSubmit()">
            <div class="form-group">
                <label class="required">Email Address</label>
                <input type="text" placeholder="Please enter your email address" id="email" name="email">
                <p class="form-tip"></p>
            </div>
            <div class="form-group">
                <label class="required">Password</label>
                <input type="password" placeholder="Please enter your password" id="password" name="password">
                <p class="form-tip"></p>
            </div>
            <div class="checkbox-line" style="justify-content: flex-start; margin: 1rem 0;">
                <input type="checkbox" id="remember_me" name="remember_me" value="1">
                <label for="remember_me">Remember Me</label>
            </div>
            <div class="form-links">
                <a href="/auth/forgot_password.html">Forgot Password?</a>
            </div>
            <div class="action-btns" style="margin-top: 0;">
                <button class="btn-primary" type="submit" id="loginBtn">Login</button>
            </div>
            <div id="loginResult" class="mt-3"></div>
        </form>
    </div>

    <div id="footer-placeholder"></div>
</div>

<script src="/static/js/jquery-3.6.0.min.js"></script>
<script src="/static/js/jquery.validate.min.js"></script>
<script src="/static/js/additional-methods.min.js"></script>
<script src="/static/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/sweetalert2@11.js"></script>
<script src="/static/js/common.js"></script>
<script src="/js/config.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/app.js"></script>
<script>
$(function() {
    App.initLayout('index');

    $("#loginForm").validate({
        errorClass: "error-tip", errorElement: "p",
        rules: { email: { required: true, email: true }, password: { required: true } },
        messages: {
            email: { required: "Please enter your email", email: "The email format you entered is incorrect" },
            password: { required: "Please enter your password" }
        }
    });

    $(".checkbox-line").click(function(e) {
        if (!$('#remember_me').is(':checked')) { $('#remember_me').prop('checked', false); }
        else { $('#remember_me').prop('checked', true); }
    });
    $('#email').val(localStorage.getItem('msra_login_email'));
});

function loginSubmit() {
    event.preventDefault();
    var btn = document.getElementById('loginBtn');
    if (!$("#loginForm").valid()) return false;

    var formData = new FormData(document.getElementById('loginForm'));
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Logging in...';

    Auth.apiPost('/auth/login', Object.fromEntries(formData))
        .then(function(result) {
            if (result.code === 200) {
                Auth.setToken(result.data.token);
                Auth.setUser(result.data.user);
                window.location.href = '/index.html';
            } else {
                if (result.field) {
                    $("#loginForm").validate().showErrors({ [result.field]: result.msg });
                } else {
                    lk.alert.info("Login fail! " + result.msg);
                }
            }
        })
        .catch(function() { lk.alert.info("Network error, please try again."); })
        .finally(function() { btn.disabled = false; btn.innerHTML = 'Login'; });
    return false;
}
</script>
</body>
</html>
