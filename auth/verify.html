<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Verification - Global AI Values Challenge</title>
    <link href="../static/css/bootstrap.min.css" rel="stylesheet">
    <link href="../static/css/style.css" rel="stylesheet">
    <link rel="stylesheet" href="../static/fontawesome/css/all.min.css">
    <link href="../static/css/main.css" rel="stylesheet">
    <link href="../static/css/dev.css" rel="stylesheet">
    <style>a:hover{text-decoration:unset;} .fa-check-circle{animation:bounceIn 1s ease-in-out;} @keyframes bounceIn{0%{transform:scale(0.3);opacity:0}50%{transform:scale(1.05);opacity:1}70%{transform:scale(0.9)}100%{transform:scale(1)}}</style>
</head>
<body>
<div id="app">
    <div id="header-placeholder"></div>
    <div class="banner"><img src="../static/images/banner@2x.jpg" alt=""></div>
    <div id="nav-placeholder"></div>

    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card">
                <div class="card-header text-white" id="verifyHeader"><h4 class="mb-0">Email Verification</h4></div>
                <div class="card-body text-center">
                    <div class="mb-4" id="verifyIcon"></div>
                    <div class="mt-4">
                        <a href="/index.html" class="btn btn-outline-primary mr-2"><i class="fas fa-home"></i> Return to Home</a>
                        <a href="/auth/login.html" class="btn btn-primary"><i class="fas fa-sign-in-alt"></i> Go to Login Page</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>
</div>
<script src="../js/config.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/app.js"></script>
<script type="text/javascript" src="../static/js/cookieconsent-config.js"></script>
<script>
$(function() {
    App.initLayout('index');
    var params = new URLSearchParams(window.location.search);
    var token = params.get('token');
    if (token) {
        Auth.apiGet('/auth/verify?token=' + encodeURIComponent(token))
            .then(function(result) {
                if (result.code === 200) {
                    $('#verifyHeader').addClass('bg-success');
                    $('#verifyIcon').html('<i class="fas fa-check-circle fa-5x text-success mb-3"></i><h3>Thank You for Registering!</h3>');
                } else {
                    $('#verifyHeader').addClass('bg-warning');
                    $('#verifyIcon').html('<i class="fas fa-check-circle fa-5x text-warning mb-3"></i><h3>Thank You for Registering!</h3>');
                }
            });
    } else {
        $('#verifyHeader').addClass('bg-warning');
        $('#verifyMsg').html('<h5>No verification token provided</h5>');
    }
});
</script>
</body>
</html>
